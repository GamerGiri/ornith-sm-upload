services:
  - type: web
    name: social-media-poster
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3000
      # Add your actual API keys here (RENDER RECOMMENDED TO USE SECRET MANAGER)
      - key: FACEBOOK_PAGE_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
