services:
  - type: web
    name: social-media-cross-poster
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://user:password@db-host.render.com:5432/db_name
      - key: REDIS_URL
        value: redis://default:password@cache-host.render.com:6379/0
